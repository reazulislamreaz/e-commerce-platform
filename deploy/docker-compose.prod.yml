# Production stack for a single VPS.
# Images are built in GitHub Actions and pulled from Docker Hub; this file is
# copied to the VPS by the deploy workflow and run with `docker compose ... up -d`.
#
#   docker compose --env-file .env -f docker-compose.prod.yml up -d
#
# Required env (see .env.production.example): IMAGE_OWNER (Docker Hub username),
# IMAGE_TAG, secrets.

name: elevate

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # One-shot: applies pending Prisma migrations, then seeds when allowed.
  # Seeding is skipped in production unless ENABLE_PRODUCTION_SEED=true.
  # A failed seed fails this service (and blocks backend start).
  migrate:
    image: ${IMAGE_OWNER}/elevate-backend:${IMAGE_TAG:-latest}
    restart: 'no'
    working_dir: /app/backend
    command: ['sh', './scripts/migrate-and-seed.sh']
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      ENABLE_PRODUCTION_SEED: ${ENABLE_PRODUCTION_SEED:-false}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      SEED_PROFILE: ${SEED_PROFILE:-full}
      SEED_COMMERCE_DEMO: ${SEED_COMMERCE_DEMO:-true}
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL:-}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD:-}
      SEED_SUPER_ADMIN_PHONE: ${SEED_SUPER_ADMIN_PHONE:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@elevateapparel.demo}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-01710000002}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  backend:
    image: ${IMAGE_OWNER}/elevate-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4040
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      # Must be false when serving over plain HTTP (IP-only). Set to true only
      # behind HTTPS, or browsers will not send/store the auth cookies.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      CONTACT_INBOX: ${CONTACT_INBOX:-}
      PRODUCT_UPLOAD_DIR: /app/backend/uploads/products
      REPORTS_STORAGE_DIR: /app/backend/storage/reports
      CRM_HIGH_VALUE_THRESHOLD_POISHA: ${CRM_HIGH_VALUE_THRESHOLD_POISHA:-1000000}
    volumes:
      - product_uploads:/app/backend/uploads/products
      - report_exports:/app/backend/storage/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  frontend:
    image: ${IMAGE_OWNER}/elevate-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3030
      HOSTNAME: 0.0.0.0
      # Server-side rendering calls the backend over the internal Docker
      # network; browsers keep using the public NEXT_PUBLIC_API_URL.
      API_URL_INTERNAL: http://backend:4040/api/v1
    depends_on:
      - backend
    networks: [internal]

  # HTTP-only reverse proxy for an IP deployment. Single origin:
  # /api and /uploads go to the backend, everything else to the frontend.
  # Host port 8080 is used because the VPS already runs a host nginx on :80/:443.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks: [internal, web]

volumes:
  postgres_data:
  redis_data:
  product_uploads:
  report_exports:

networks:
  internal:
  web:
