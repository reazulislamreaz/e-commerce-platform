# Active upstream targets for the reverse proxy.
# Managed by deploy/rollout.sh during zero-downtime cutover.
# Do not point these at host ports — use Compose service DNS names only.
#
# Modes:
#   primary  → backend / frontend   (steady state)
#   next     → backend_next / frontend_next (traffic on candidates)

upstream backend_upstream {
    server backend:4040;
}

upstream frontend_upstream {
    server frontend:3030;
}
