# Single-origin HTTP reverse proxy for an IP-only deployment (no domain / TLS).
# The storefront, the API (/api) and uploaded media (/uploads) are all served
# from the same origin on port 80, which keeps auth cookies same-site-simple.
#
# When a real domain is available later, add a TLS server block (443) and an
# HTTP->HTTPS redirect, and re-enable secure cookies (COOKIE_SECURE=true).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 15m;

    # API (NestJS) — full URI is preserved (e.g. /api/v1/auth/refresh).
    location /api/ {
        proxy_pass http://backend:4040;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded product media served as static assets by the API.
    location /uploads/ {
        proxy_pass http://backend:4040;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Next.js).
    location / {
        proxy_pass http://frontend:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
