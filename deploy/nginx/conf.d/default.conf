# Single-origin HTTP reverse proxy for an IP-only deployment (no domain / TLS).
# The storefront, the API (/api) and uploaded media (/uploads) are all served
# from the same origin on port 80, which keeps auth cookies same-site-simple.
#
# Upstream hostnames live in upstreams.conf so rollout.sh can cut traffic over
# to candidate containers without rebuilding this file.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 15m;

    # API (NestJS) — full URI is preserved (e.g. /api/v1/auth/refresh).
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded product media served as static assets by the API.
    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Next.js).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
