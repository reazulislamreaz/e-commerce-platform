name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=backend
        env:
          # prisma.config.ts resolves env('DATABASE_URL') at config load, even
          # for generate (no DB connection is made) — any placeholder works.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Lint backend
        run: npm run lint --workspace=backend
      - name: Lint frontend
        run: npm run lint --workspace=frontend
      - name: Test backend
        run: npm run test --workspace=backend
      - name: Build backend
        run: npm run build --workspace=backend
      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce -d ecommerce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      FRONTEND_ORIGIN: http://localhost:3000
      SEED_SUPER_ADMIN_EMAIL: superadmin@example.com
      SEED_SUPER_ADMIN_PASSWORD: SuperAdminPass123
      # Quote the phone: YAML treats leading-zero numbers as octal and would
      # turn 01700000000 into an integer, which then fails BD phone validation.
      SEED_SUPER_ADMIN_PHONE: '01770807782'
      SEED_ADMIN_EMAIL: admin@elevateapparel.demo
      SEED_ADMIN_PASSWORD: AdminDemoPass123
      SEED_ADMIN_PHONE: '01710000002'
      SEED_DEMO_PASSWORD: CustomerDemoPass123
      SEED_PROFILE: full
      SEED_COMMERCE_DEMO: 'true'
      # Integration job NODE_ENV=test — seed always runs (not production).
      ENABLE_PRODUCTION_SEED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=backend
      - name: Migrate and seed test database
        # Fails the job if either migrations or the seed pipeline fail.
        run: npm run prisma:migrate-and-seed --workspace=backend
      - name: Run integration and COD smoke tests
        run: npm run test:integration --workspace=backend

  # Build and publish production images to Docker Hub. Only on pushes to main,
  # after all quality gates and integration tests pass.
  build-and-push:
    needs: [quality, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/elevate-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/elevate-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/elevate-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/elevate-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
            NEXT_PUBLIC_WHATSAPP_MESSAGE=${{ secrets.NEXT_PUBLIC_WHATSAPP_MESSAGE }}
            NEXT_PUBLIC_CONTACT_PHONE=${{ secrets.NEXT_PUBLIC_CONTACT_PHONE }}
            NEXT_PUBLIC_FACEBOOK_PAGE_ID=${{ secrets.NEXT_PUBLIC_FACEBOOK_PAGE_ID }}
            NEXT_PUBLIC_FACEBOOK_PIXEL_ID=${{ secrets.NEXT_PUBLIC_FACEBOOK_PIXEL_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Ship the new images to the VPS over SSH and roll the stack.
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'deploy/docker-compose.prod.yml,deploy/.env.production.example,deploy/rollout.sh,deploy/nginx'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
      - name: Pull images and roll out with health checks
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKER_TOKEN
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f .env ]; then
              echo "ERROR: .env missing on the VPS. Create it from .env.production.example before deploying." >&2
              exit 1
            fi
            chmod +x ./rollout.sh
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            export IMAGE_TAG
            # Zero-downtime: pull → migrate → candidates → health → nginx cutover →
            # recreate primary → restore upstreams. Failed candidates leave the
            # previous containers serving traffic (no 502 from a blind recreate).
            ./rollout.sh
            docker image prune -f
            docker logout
