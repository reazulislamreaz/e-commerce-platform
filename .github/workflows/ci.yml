name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=backend
      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Lint backend
        run: npm run lint --workspace=backend
      - name: Lint frontend
        run: npm run lint --workspace=frontend
      - name: Test backend
        run: npm run test --workspace=backend
      - name: Build backend
        run: npm run build --workspace=backend
      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce -d ecommerce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      FRONTEND_ORIGIN: http://localhost:3000
      SEED_SUPER_ADMIN_EMAIL: superadmin@example.com
      SEED_SUPER_ADMIN_PASSWORD: SuperAdminPass123
      SEED_SUPER_ADMIN_PHONE: 01700000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=backend
      - name: Migrate test database
        run: npx prisma migrate deploy
        working-directory: backend
      - name: Seed catalog fixtures
        run: npm run prisma:seed --workspace=backend
      - name: Run integration and COD smoke tests
        run: npm run test:integration --workspace=backend
